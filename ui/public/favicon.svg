<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="zerchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#zerchGradient)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Central nodes (vector search concept) -->
  <circle cx="32" cy="20" r="3" fill="url(#zerchGradient)"/>
  <circle cx="44" cy="32" r="3" fill="url(#zerchGradient)"/>
  <circle cx="32" cy="44" r="3" fill="url(#zerchGradient)"/>
  <circle cx="20" cy="32" r="3" fill="url(#zerchGradient)"/>
  
  <!-- Central hub -->
  <circle cx="32" cy="32" r="4" fill="url(#zerchGradient)"/>
  
  <!-- Connection lines (vector paths) -->
  <line x1="32" y1="20" x2="32" y2="28" stroke="url(#zerchGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="44" y1="32" x2="36" y2="32" stroke="url(#zerchGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="44" x2="32" y2="36" stroke="url(#zerchGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="32" x2="28" y2="32" stroke="url(#zerchGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Diagonal connections for dynamic feel -->
  <line x1="40" y1="24" x2="36" y2="28" stroke="url(#zerchGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="40" x2="36" y2="36" stroke="url(#zerchGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="40" x2="28" y2="36" stroke="url(#zerchGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="24" x2="28" y2="28" stroke="url(#zerchGradient)" stroke-width="1" opacity="0.4"/>
</svg>